spring:
  application:
    name: picpay-clone

  datasource:
    url: jdbc:h2:mem:picpaydb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect

server:
  port: 8080

jwt:
  secret: 3f8a2b7c1d9e4f6a0b5c8d2e7f1a4b9c3d6e0f2a5b8c1d4e7f0a3b6c9d2e5f8
  expiration: 86400000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method